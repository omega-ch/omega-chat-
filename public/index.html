<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oméga Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>🤖 Oméga Chat</h1>
            <div class="controls">
                <div class="version-selector">
                    <label for="version-select">Modèle :</label>
                    <select id="version-select">
                        <option value="1.5">Oméga 1.5 (Qwen-VL)</option>
                        <option value="1.0">Oméga 1.0 (Gemini-2.5-Flash)</option>
                    </select>
                </div>
                <div class="search-toggle">
                    <label>
                        <input type="checkbox" id="search-toggle">
                        <span>🔍 Recherche Web</span>
                    </label>
                </div>
            </div>
        </header>
        
        <div id="chat-messages" class="chat-messages"></div>
        
        <div class="input-area">
            <label for="file-input" class="file-upload-btn">📎</label>
            <input type="file" id="file-input" style="display: none;">
            <span id="file-name" class="file-name-display"></span>
            
            <input type="text" id="user-input" placeholder="Écrivez votre message..." autocomplete="off">
            <button id="send-btn">Envoyer</button>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            Oméga réfléchit...
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
